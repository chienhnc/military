AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: military-manager Spring Boot API on AWS Lambda

Parameters:
  JwtSecret:
    Type: String
    NoEcho: true
    Description: Base64-encoded JWT secret (minimum 256-bit key)
  S3Bucket:
    Type: String
    Description: S3 bucket name for personnel images
  S3Prefix:
    Type: String
    Default: personnel
    Description: S3 prefix/folder for personnel images

Resources:
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  RolesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: roles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: name
          AttributeType: S
      KeySchema:
        - AttributeName: name
          KeyType: HASH

  PersonnelTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: military_personnel
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  RegionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: military_regions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  UnitsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: military_units
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  SubmissionGroupsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: submission_groups
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  SubmissionFlowsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: submission_flows
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  MilitaryHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default

  MilitaryApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: military-manager-api
      Runtime: java17
      Handler: com.military.StreamLambdaHandler::handleRequest
      CodeUri: target/military-manager-0.0.1-SNAPSHOT-aws.jar
      MemorySize: 1024
      Timeout: 30
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:DeleteObject
              Resource: !Sub arn:aws:s3:::${S3Bucket}/*
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:DeleteItem
                - dynamodb:Scan
              Resource:
                - !GetAtt UsersTable.Arn
                - !GetAtt RolesTable.Arn
                - !GetAtt PersonnelTable.Arn
                - !GetAtt RegionsTable.Arn
                - !GetAtt UnitsTable.Arn
                - !GetAtt SubmissionGroupsTable.Arn
                - !GetAtt SubmissionFlowsTable.Arn
      Environment:
        Variables:
          JWT_SECRET: !Ref JwtSecret
          S3_BUCKET: !Ref S3Bucket
          S3_PREFIX: !Ref S3Prefix
          DYNAMODB_USERS_TABLE: !Ref UsersTable
          DYNAMODB_ROLES_TABLE: !Ref RolesTable
          DYNAMODB_PERSONNEL_TABLE: !Ref PersonnelTable
          DYNAMODB_REGIONS_TABLE: !Ref RegionsTable
          DYNAMODB_UNITS_TABLE: !Ref UnitsTable
          DYNAMODB_SUBMISSION_GROUPS_TABLE: !Ref SubmissionGroupsTable
          DYNAMODB_SUBMISSION_FLOWS_TABLE: !Ref SubmissionFlowsTable
      Events:
        RootApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref MilitaryHttpApi
            Path: /
            Method: ANY
        ProxyApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref MilitaryHttpApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${MilitaryHttpApi}.execute-api.${AWS::Region}.amazonaws.com/
